<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Maicasa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0f1128;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 380px;
      width: 100%;
    }
    .icon {
      width: 72px; height: 72px;
      background: rgba(22,163,74,0.15);
      border: 2px solid rgba(22,163,74,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      font-family: inherit;
    }
    .sub { margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
        stroke="#4ade80" stroke-width="2.5" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>You're all set</h1>
    <p>Your Maicasa subscription is active. Open the app and sign in to access your new features.</p>
    <a href="https://apps.apple.com/app/maicasa" class="btn">Open Maicasa</a>
    <p class="sub">Questions? Email dev@maisoftware.app</p>
  </div>
</body>
</html>
