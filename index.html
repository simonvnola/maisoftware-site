<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mai Software — Apps</title>
<meta name="description" content="Apps built to make everyday life simpler.">
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f1118; --ink-soft: #5a5f72; --ink-muted: #9aa0b8;
    --purple: #667eea; --purple-light: #eef0ff;
    --border: rgba(102,126,234,0.12); --bg: #fafbff;
  }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 24px; -webkit-font-smoothing: antialiased;
  }
  .wordmark { font-size: 13px; font-weight: 300; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 56px; }
  .apps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 380px; }
  .app-link {
    display: flex; align-items: center; gap: 16px; padding: 18px 20px;
    background: white; border: 1px solid var(--border); border-radius: 18px;
    text-decoration: none; color: var(--ink);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .app-link:hover { box-shadow: 0 6px 24px rgba(102,126,234,0.12); transform: translateY(-1px); }
  .app-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(140deg, #8b9fef, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: 0 4px 12px rgba(102,126,234,0.3);
  }
  .app-icon img {
    width: 100%; height: 100%; display: block; object-fit: cover; border-radius: inherit;
  }
  .app-name { font-size: 17px; font-weight: 300; letter-spacing: -0.01em; margin-bottom: 2px; }
  .app-desc { font-size: 12px; color: var(--ink-muted); font-weight: 300; }
  .app-arrow { margin-left: auto; color: var(--ink-muted); flex-shrink: 0; }
  .soon { opacity: 0.4; pointer-events: none; }
  .soon-tag { font-size: 10px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); background: var(--purple-light); padding: 3px 8px; border-radius: 999px; margin-left: auto; }
  footer { margin-top: 56px; font-size: 11px; color: var(--ink-muted); font-weight: 300; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="wordmark">Mai Software</div>
<div class="apps">
  <a href="/maicasa" class="app-link">
    <div class="app-icon">
      <svg width="22" height="20" viewBox="0 0 22 20" fill="none">
        <path d="M11 1.5L20.5 9.5H18V18H13.5V12.5H8.5V18H4V9.5H1.5Z" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M7 14L9.5 16.5L15 10.5" stroke="rgba(255,255,255,0.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div><div class="app-name">maicasa</div><div class="app-desc">Home maintenance, simplified</div></div>
    <div class="app-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
  </a>
  <div class="app-link soon">
    <div class="app-icon" style="background:linear-gradient(140deg,#d79bff,#7c59d3);">
      <svg width="26" height="26" viewBox="0 0 104 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="maiconflicts-icon-clip">
            <circle cx="52" cy="35" r="20" />
          </clipPath>
        </defs>
        <circle cx="52" cy="35" r="20" fill="rgba(255,255,255,0.92)" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" />
        <circle cx="36" cy="65" r="20" fill="rgba(255,255,255,0.75)" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" />
        <circle cx="68" cy="65" r="20" fill="rgba(255,255,255,0.62)" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" />
        <circle cx="36" cy="65" r="20" fill="rgba(255,255,255,0.42)" clip-path="url(#maiconflicts-icon-clip)" />
        <circle cx="68" cy="65" r="20" fill="rgba(255,255,255,0.30)" clip-path="url(#maiconflicts-icon-clip)" />
      </svg>
    </div>
    <div><div class="app-name">maiconflicts</div><div class="app-desc">Conflicts Management software for companies</div></div>
    <div class="soon-tag">Soon</div>
  </div>
  <div class="app-link soon">
    <div class="app-icon" style="background:#fff;">
      <img src="/assets/logos/Probono.png" alt="ProBono logo">
    </div>
    <div><div class="app-name">ProBono</div><div class="app-desc">Giving made thoughtful and easy</div></div>
    <div class="soon-tag">Soon</div>
  </div>
  <div class="app-link soon">
    <div class="app-icon" style="background:linear-gradient(140deg,#f2c6d8,#b45982);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 7h10v5c0 2.5-1.5 4-5 4s-5-1.5-5-4V7Z"/>
        <path d="M10 7V4h4v3"/>
        <path d="M9 16h6"/>
      </svg>
    </div>
    <div><div class="app-name">maicellar</div><div class="app-desc">Wine cellar tracking and pairing suggestions</div></div>
    <div class="soon-tag">Soon</div>
  </div>
  <div class="app-link soon">
    <div class="app-icon" style="background:linear-gradient(140deg,#ffe4b0,#d78c3d);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.6" stroke-linecap="round"><path d="M12 5l7 7-7 7-7-7 7-7Z"/></svg>
    </div>
    <div><div class="app-name">maitie</div><div class="app-desc">Your AI assistant for fashion advice</div></div>
    <div class="soon-tag">Soon</div>
  </div>
</div>
<footer>&copy; 2025 Mai Software</footer>
</body>
</html>
